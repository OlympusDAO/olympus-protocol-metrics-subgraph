# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: olympus-protocol-metrics
description: Olympus protocol metrics for Arbitrum and Berachain

networks:
  - id: 42161 # Arbitrum One
    start_block: 10950000 # 2022-05-01
    contracts:
      - name: ArbitrumFraxUsdTriggerOld
        address: "0x5d041081725468aa43e72ff0445fde2ad1ade775" # FRAX-USD aggregator, stopped updating around 2026-04-10
        start_block: 10950000 # 2022-05-01
        handler: src/EventHandlers.ts
        events:
          - event: "NewRound(uint256 indexed roundId, address indexed startedBy, uint256 startedAt)"
      - name: ArbitrumFraxUsdTriggerNew
        address: "0x767802a8610c3d34cbec9d064028eaca976daba0" # FRAX-USD aggregator after April 2026 rotation
        start_block: 451191255 # 2026-04-11 00:00:00 UTC
        handler: src/EventHandlers.ts
        events:
          - event: "NewRound(uint256 indexed roundId, address indexed startedBy, uint256 startedAt)"
  - id: 80094 # Berachain
    start_block: 799194 # 2025-02-07 00:00:00 UTC
    contracts:
      - name: BerachainSnapshotAnchor
        address: "0x18878df23e2a36f81e820e4b47b4a40576d3159c" # OHM
        handler: src/EventHandlers.ts
        events:
          - event: "Transfer(address indexed from, address indexed to, uint256 value)"

unordered_multichain_mode: true
preload_handlers: true
address_format: lowercase
