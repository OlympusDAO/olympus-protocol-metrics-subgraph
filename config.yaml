# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: olympus-protocol-metrics
description: Olympus protocol metrics for Arbitrum and Berachain

# Reusable contract definitions shared across chains. Each `events` entry is the
# Solidity event signature with parameter names so HyperIndex codegen produces
# typed `event.params` access.
contracts:
  - name: TreasuryERC20
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: OhmERC20
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: LpERC20
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  # WETH9-family wrappers (canonical WETH9 on Ethereum + forks on most L2s/L1s).
  # `deposit()` and `withdraw()` mutate `balanceOf` internally and emit only the
  # Deposit/Withdrawal events — NOT Transfer. Subscribing only to Transfer leaves
  # wrap/unwrap activity invisible and the TokenBalance ledger drifts negative
  # for wallets that wrap-and-forward (see Eth WETH @ LUSD_ALLOCATOR trace in
  # tasks/pr-311-feedback.md). Handler in Erc20Transfers.ts treats Deposit as a
  # synthetic "Transfer from 0x0" (+wad) and Withdrawal as "Transfer to 0x0" (-wad).
  - name: Wrapped9
    events:
      - event: "Deposit(address indexed dst, uint256 wad)"
      - event: "Withdrawal(address indexed src, uint256 wad)"

  # ERC4626 yield-bearing vaults (sDAI / sUSDe / sUSDS / Gauntlet sUSDS, etc.).
  # The standard Deposit/Withdraw events fire on share mint/burn, but the share
  # balance mutation skips emitting a Transfer-from/to-zero on most vault
  # implementations (sDAI verified: only Deposit fires on deposit; only Withdraw
  # fires on redeem). Without subscribing to these, wallets that deposit/redeem
  # show only the direct Transfer activity between wallets, and the ledger drifts.
  # Handler treats Deposit as +shares to owner and Withdraw as -shares from owner.
  - name: Erc4626Vault
    events:
      - event: "Deposit(address indexed sender, address indexed owner, uint256 assets, uint256 shares)"
      - event: "Withdraw(address indexed sender, address indexed receiver, address indexed owner, uint256 assets, uint256 shares)"

  # Synthetix-style StakingRewards vaults (Beradrome reward vaults on Berachain,
  # plus Infrared / BeraHub variants of the Kodiak OHM-HONEY position). The
  # vault contract IS the "stake token" address — `balanceOf(user)` returns the
  # user's _balances[user] entry, but stake()/withdraw() only emit
  # Staked/Withdrawn events; no Transfer for the stake-balance mutation. We
  # treat Staked as +amount to user and Withdrawn as -amount from user.
  - name: StakingRewardsVault
    events:
      - event: "Staked(address indexed user, uint256 amount)"
      - event: "Withdrawn(address indexed user, uint256 amount)"

  - name: OlympusLender
    events:
      - event: "AMOAdded(address indexed amo)"
      - event: "AMORemoved(address indexed amo)"

  - name: JonesStaking
    events:
      - event: "Deposit(address indexed user, uint256 indexed pid, uint256 amount)"
      - event: "Withdraw(address indexed user, uint256 indexed pid, uint256 amount)"
      - event: "EmergencyWithdraw(address indexed user, uint256 indexed pid, uint256 amount)"

  - name: TreasureMining
    events:
      - event: "Deposit(address indexed user, uint256 indexed index, uint256 amount, uint8 lock)"
      - event: "Withdraw(address indexed user, uint256 indexed index, uint256 amount)"

  - name: UniswapV2Pool
    # Univ2 pairs ARE the LP token, so they also emit ERC20 Transfer events.
    # Both event handlers live under one contract so the address only gets
    # registered once with Envio's address table.
    events:
      - event: "Sync(uint112 reserve0, uint112 reserve1)"
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: UniswapV3Pool
    events:
      - event: "Initialize(uint160 sqrtPriceX96, int24 tick)"
      - event: "Swap(address indexed sender, address indexed recipient, int256 amount0, int256 amount1, uint160 sqrtPriceX96, uint128 liquidity, int24 tick)"

  # Kodiak LP wraps a UniswapV3 pool. We subscribe to ERC20 Transfer (for
  # treasury balance + totalSupply) AND use contractRegister to dynamically
  # subscribe the underlying UniV3 pool's Swap events for pure-math pricing.
  - name: KodiakLp
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  # Balancer V2 Vault is one contract per chain that holds ALL pools. We filter
  # events by the poolIds we care about so HyperSync only delivers what's
  # relevant.
  - name: BalancerVault
    events:
      - event: "TokensRegistered(bytes32 indexed poolId, address[] tokens, address[] assetManagers)"
      - event: "PoolBalanceChanged(bytes32 indexed poolId, address indexed liquidityProvider, address[] tokens, int256[] deltas, uint256[] protocolFeeAmounts)"
      - event: "Swap(bytes32 indexed poolId, address indexed tokenIn, address indexed tokenOut, uint256 amountIn, uint256 amountOut)"

  # Chainlink AggregatorV3 feeds. Each AnswerUpdated emits the new oracle
  # price; the handler maps src feed address -> tokenAddress via the per-chain
  # chainlink LiquidityHandler config and writes ChainlinkPriceState. Phase 4
  # wires per-chain feed addresses; this entry just declares the event shape so
  # codegen produces the typed handler.
  - name: ChainlinkAggregator
    events:
      - event: "AnswerUpdated(int256 indexed current, uint256 indexed roundId, uint256 updatedAt)"

  # sOHM V3 emits LogRebase on every staking-epoch rebase. The handler
  # persists the new `index` into OhmIndexState; the gOHM pricing handler
  # reads it to compute gOHM_price = OHM_price * index/1e9. Currently
  # Ethereum-only (sOHM is not deployed on the L2s).
  - name: SOhmV3
    events:
      - event: "LogRebase(uint256 indexed epoch, uint256 rebase, uint256 index)"

  # Bophades Kernel. ActionExecuted fires on InstallModule / UpgradeModule /
  # ActivatePolicy / DeactivatePolicy / ChangeExecutor / MigrateKernel.
  # The handler tracks module installs/upgrades to maintain BophadesModule —
  # the event-driven replacement for legacy's per-block kernel.getModuleForKeycode().
  - name: BophadesKernel
    events:
      - event: "ActionExecuted(uint8 action, address indexed target_)"

  # Olympus V1 BondManager emits GnosisAuctionLaunched whenever a new bond
  # auction is opened. The handler creates a GnosisAuction record so the
  # snapshot path can attribute pre-minted / vesting / vested OHM correctly.
  - name: BondManager
    events:
      - event: "GnosisAuctionLaunched(uint256 marketId, address auctionToken, uint96 capacity, uint48 bondTerm)"

  # Gnosis EasyAuction is the matching engine behind Olympus bond auctions.
  # AuctionCleared completes the GnosisAuction record with the cleared bid
  # quantity (= OHM sold) so the snapshot can switch the auction from
  # "open / pre-minted" to "closed / vesting" accounting.
  - name: GnosisEasyAuction
    events:
      - event: "AuctionCleared(uint256 indexed auctionId, uint96 soldAuctioningTokens, uint96 soldBiddingTokens, bytes32 clearingPriceOrder)"

  # ClearinghouseRegistry events are tracked via dynamic contract registration
  # once the Kernel handler observes the CHREG module address (see Phase 4
  # follow-up). For now the 3 known Cooler clearinghouses are hardcoded in
  # `src/snapshot/wallets.ts` so Cooler-receivable accounting still works.

