          - "0xb7e50106a5bd3cf21af210a755f9c8740890a8c9" # UniV2 MAGIC-wETH
          - "0x8aCd42e4B5A5750B44A28C5fb50906eBfF145359" # Camelot OHM-wETH

      # Univ3 pools used for pricing (Swap/Initialize drive sqrtPriceX96)
      - name: UniswapV3Pool
        address:
          - "0xc31e54c7a869b9fcbecc14363cf510d1c41fa443" # UniV3 wETH-USDC
          - "0xc6f780497a95e246eb9449f5e4770916dcd6396a" # UniV3 ARB-wETH

      # Chainlink feeds. Each address must have a matching `chainlink` entry in
