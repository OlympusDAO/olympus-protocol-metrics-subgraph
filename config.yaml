          - "0x8D9bA570D6cb60C7e3e0F31343Efe75AB8E65FB1" # gOHM (Synapse)
          - "0xD8102963c400fEDBbc23Fe92f1b09c0C561e77Ae" # Silo OHM Collateral
          - "0x37E6a0EcB9e8E5D90104590049a0A197E1363b67" # Sentiment lToken

      # ---- OHM ERC20: also need from/to-zero transfers to track totalSupply.
      - name: OhmERC20
        address:
          - "0xf0cb2dc0db5e6c66B9a70Ac27B06b878da017028" # OHM

      # ---- LP tokens that are NOT Univ2 pairs. Univ2 pair Transfer events are
      # handled under the UniswapV2Pool contract so the same pair address isn't
      # registered twice.
      - name: LpERC20
        address:
          - "0xc61ff48f94d801c1ceface0289085197b5ec44f0" # Balancer wETH-VSTA BPT
          - "0x89dc7e71e362faf88d92288fe2311d25c6a1b5e0" # Balancer wETH-OHM BPT
