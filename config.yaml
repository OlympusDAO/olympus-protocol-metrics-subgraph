# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: olympus-protocol-metrics
description: Olympus protocol metrics for Arbitrum and Berachain

# Reusable contract definitions shared across chains. Each `events` entry is the
# Solidity event signature with parameter names so HyperIndex codegen produces
# typed `event.params` access.
contracts:
  - name: TreasuryERC20
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: OhmERC20
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: LpERC20
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: OlympusLender
    events:
      - event: "AMOAdded(address indexed amo)"
      - event: "AMORemoved(address indexed amo)"

  - name: JonesStaking
    events:
      - event: "Deposit(address indexed user, uint256 indexed pid, uint256 amount)"
      - event: "Withdraw(address indexed user, uint256 indexed pid, uint256 amount)"
      - event: "EmergencyWithdraw(address indexed user, uint256 indexed pid, uint256 amount)"

  - name: TreasureMining
    events:
      - event: "Deposit(address indexed user, uint256 indexed index, uint256 amount, uint8 lock)"
      - event: "Withdraw(address indexed user, uint256 indexed index, uint256 amount)"

  - name: UniswapV2Pool
    # Univ2 pairs ARE the LP token, so they also emit ERC20 Transfer events.
    # Both event handlers live under one contract so the address only gets
    # registered once with Envio's address table.
    events:
      - event: "Sync(uint112 reserve0, uint112 reserve1)"
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  - name: UniswapV3Pool
    events:
      - event: "Initialize(uint160 sqrtPriceX96, int24 tick)"
      - event: "Swap(address indexed sender, address indexed recipient, int256 amount0, int256 amount1, uint160 sqrtPriceX96, uint128 liquidity, int24 tick)"

  # Kodiak LP wraps a UniswapV3 pool. We subscribe to ERC20 Transfer (for
  # treasury balance + totalSupply) AND use contractRegister to dynamically
  # subscribe the underlying UniV3 pool's Swap events for pure-math pricing.
  - name: KodiakLp
    events:
      - event: "Transfer(address indexed from, address indexed to, uint256 value)"

  # Balancer V2 Vault is one contract per chain that holds ALL pools. We filter
  # events by the poolIds we care about so HyperSync only delivers what's
  # relevant.
  - name: BalancerVault
    events:
      - event: "TokensRegistered(bytes32 indexed poolId, address[] tokens, address[] assetManagers)"
      - event: "PoolBalanceChanged(bytes32 indexed poolId, address indexed liquidityProvider, address[] tokens, int256[] deltas, uint256[] protocolFeeAmounts)"
      - event: "Swap(bytes32 indexed poolId, address indexed tokenIn, address indexed tokenOut, uint256 amountIn, uint256 amountOut)"

