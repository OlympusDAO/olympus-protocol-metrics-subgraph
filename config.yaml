      # The `where` filter is applied at handler registration time (see Erc20Transfers.ts).
      - name: TreasuryERC20
        address:
          - "0x912ce59144191c1204e64559fe8253a0e49e6548" # ARB
          - "0x17FC002b466eEc40DaE837Fc4bE5c67993ddBd6F" # FRAX
          - "0x10393c20975cf177a3513071bc110f7962cd67da" # JONES
          - "0xfb9E5D956D889D91a82737B9bFCDaC1DCE3e1449" # LQTY
          - "0x93b346b6bc2548da6a1e7d98e9a421b42541425b" # LUSD
          - "0x539bde0d7dbd336b79148aa742883198bbf60342" # MAGIC
          - "0xff970a61a04b1ca14834a43f5de4533ebddb5cc8" # USDC
          - "0xa684cd057951541187f288294a1e1c2646aa2d24" # VSTA
          - "0x82aF49447D8a07e3bd95BD0d56f35241523fBab1" # WETH
          - "0x8D9bA570D6cb60C7e3e0F31343Efe75AB8E65FB1" # gOHM (Synapse)
          - "0xD8102963c400fEDBbc23Fe92f1b09c0C561e77Ae" # Silo OHM Collateral
          - "0x37E6a0EcB9e8E5D90104590049a0A197E1363b67" # Sentiment lToken

      # ---- OHM ERC20: also need from/to-zero transfers to track totalSupply.
      - name: OhmERC20
        address:
          - "0xf0cb2dc0db5e6c66B9a70Ac27B06b878da017028" # OHM

      # ---- LP tokens that are NOT Univ2 pairs. Univ2 pair Transfer events are
