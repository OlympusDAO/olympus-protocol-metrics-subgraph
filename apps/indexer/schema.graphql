# Daily UTC global snapshot aggregating per-chain TokenRecord/TokenSupply rows
# into the metrics surface that the legacy treasury-subgraph middleware exposes.
# Upserted whenever a chain writes a new 8-hour snapshot for this date.
# Phase 2: scaffold only. Phase 5 fills in the upsert logic and parity test
# against the treasury endpoint. Field set mirrors the legacy `Metric` GraphQL
# type (treasury-subgraph/apps/server/src/graphql/schema.ts) — see
# docs/envio-migration/inventory-treasury-subgraph.md section 12.
type GlobalMetricSnapshot {
  id: ID! # YYYY-MM-DD (UTC)
  # Always a UTC calendar date in YYYY-MM-DD format (matches the entity id).
  # All snapshot dates in this schema are UTC — derived from block timestamps
  # via isoDate() which formats with toISOString().slice(0, 10).
  date: String!
  updatedAtTimestamp: BigInt!

  # Completeness — `crossChainComplete` is true iff Arbitrum and Ethereum both
  # produced a chain snapshot for this date. Mirrors the legacy
  # `crossChainDataComplete` query gate, which only checks those two chains.
  crossChainComplete: Boolean! @index
  # Switched from chain-name strings to numeric chainIds per @0xJem on PR #311
  # (Step 4) — chain names had case-sensitivity risk ("Ethereum" vs "ethereum")
  # and didn't have a canonical source. chainIds are EIP-155 numbers.
  chainsIndexed: [Int!]!
  chainsMissing: [Int!]!

  # Per-chain breakdowns
  chainValues: [ChainMetricValues!]! @derivedFrom(field: "snapshot")
  supplyCategories: [ChainSupplyCategory!]! @derivedFrom(field: "snapshot")

  # Aggregate scalars (sum across chains with data for this date)
  ohmTotalSupply: BigDecimal!
  ohmCirculatingSupply: BigDecimal!
  ohmFloatingSupply: BigDecimal!
  ohmBackedSupply: BigDecimal!
  gOhmBackedSupply: BigDecimal! # ohmBackedSupply / ohmIndex
  treasuryMarketValue: BigDecimal!
  treasuryLiquidBacking: BigDecimal!

  # Canonical-chain scalars — sourced from the Ethereum chain snapshot only,
  # matching legacy `protocolMetrics[0]` dominance behavior. If Ethereum has
  # not produced a snapshot yet for this date, these fields hold the previous
  # canonical values until it does.
  ohmIndex: BigDecimal!
  ohmApy: BigDecimal!
  ohmPrice: BigDecimal!
  gOhmPrice: BigDecimal!
  sOhmCirculatingSupply: BigDecimal!
  sOhmTotalValueLocked: BigDecimal!

  # Derived
  marketCap: BigDecimal! # ohmPrice * ohmCirculatingSupply
  treasuryLiquidBackingPerOhmFloating: BigDecimal!
  treasuryLiquidBackingPerOhmBacked: BigDecimal!
  treasuryLiquidBackingPerGOhmBacked: BigDecimal!
}

# Per-chain breakdown attached to GlobalMetricSnapshot. One row per chain that
# has produced a snapshot for the date. Mirrors the legacy `ChainValues` struct
# but as an entity (Envio has no embedded value-object type).
# Renamed from GlobalMetricChainValues per @0xJem on PR #311 (Step 4).
type ChainMetricValues {
  id: ID! # YYYY-MM-DD/<chainId>
  snapshot: GlobalMetricSnapshot!
  chainId: Int! @index
  blockchain: String!
  date: String! @index
  block: BigInt!
  timestamp: BigInt!

  ohmTotalSupply: BigDecimal!
  ohmCirculatingSupply: BigDecimal!
  ohmFloatingSupply: BigDecimal!
  ohmBackedSupply: BigDecimal!
  treasuryMarketValue: BigDecimal!
  treasuryLiquidBacking: BigDecimal!
}

# Enum of the OHM-supply attribution categories. Replaces the previous freeform
# `category: String` field per @0xJem on PR #311 (Step 4); the writer maps
# from TYPE_* strings to these enum values via CATEGORY_ENUM_MAP.
enum SupplyCategoryType {
  TOTAL_SUPPLY
  TREASURY
  OHM_MIGRATION_OFFSET
  BONDS_PREMINTED
  BONDS_VESTING_DEPOSITS
  BONDS_VESTING_TOKENS
  BONDS_DEPOSITS
  LIQUIDITY
  BOOSTED_LIQUIDITY_VAULT
  LENDING
}

# Per-chain OHM supply broken down by category. Mirrors the legacy
# `SupplyCategoryValues` struct, with the user's Phase 1 decision to preserve
# both `balance` (raw on-chain) and `supplyBalance` (signed contribution to
# circulating/floating/backed totals) per category. 10 rows per
# (chain, GlobalMetricSnapshot) pair.
# Renamed from GlobalMetricSupplyCategory and added `chainId` per @0xJem on
# PR #311 (Step 4) — previously the entity carried no chain info, so
# cross-chain rollups had to infer chain from id structure.
type ChainSupplyCategory {
  id: ID! # YYYY-MM-DD/<chainId>/<category>
  snapshot: GlobalMetricSnapshot!
  chainId: Int! @index
  date: String!
  category: SupplyCategoryType! @index
  balance: BigDecimal!
  supplyBalance: BigDecimal!
}

# Stores easily-calculated metrics related to the Olympus protocol
type ProtocolMetric {
  id: ID! # YYYY-MM-DD/<block>
  block: BigInt!
  currentAPY: BigDecimal!
  currentIndex: BigDecimal!
  date: String! # YYYY-MM-DD
  gOhmPrice: BigDecimal!
  gOhmSyntheticSupply: BigDecimal
  gOhmTotalSupply: BigDecimal!
  marketCap: BigDecimal
  nextDistributedOhm: BigDecimal!
  nextEpochRebase: BigDecimal!
  ohmCirculatingSupply: BigDecimal
  ohmFloatingSupply: BigDecimal
  ohmPrice: BigDecimal!
  ohmTotalSupply: BigDecimal!
  sOhmCirculatingSupply: BigDecimal! # Returned by the sOHM contract, so can be included here
  timestamp: BigInt! # Unix timestamp in UTC
  totalValueLocked: BigDecimal!
  treasuryLiquidBacking: BigDecimal
  treasuryLiquidBackingPerGOhmSynthetic: BigDecimal
  treasuryLiquidBackingPerOhmFloating: BigDecimal
  treasuryMarketValue: BigDecimal
}

# Represents the balance of a specific token in the treasury
type TokenRecord {
  id: ID! # YYYY-MM-DD/<chainId>/<block>/<source>/<token>
  chainId: Int! @index
  blockchain: String!
  block: BigInt!
  timestamp: BigInt! # Unix timestamp in UTC
  date: String! @index
  token: String!
  tokenAddress: String!
  source: String!
  sourceAddress: String!
  rate: BigDecimal!
  balance: BigDecimal!
  multiplier: BigDecimal!
  value: BigDecimal! # Calculated
  valueExcludingOhm: BigDecimal! # Calculated
  category: String!
  isLiquid: Boolean!
  isBluechip: Boolean!
}

# Represents a balance that affects the supply of OHM
type TokenSupply {
  id: ID! # YYYY-MM-DD/<chainId>/<block>/<token>/<type>/<pool>/<source>
  chainId: Int! @index
  blockchain: String!
  block: BigInt!
  timestamp: BigInt! # Unix timestamp in UTC
  date: String! @index # YYYY-MM-DD
  token: String!
  tokenAddress: String!
  pool: String
  poolAddress: String
  source: String # e.g. a wallet
  sourceAddress: String
  type: String! # e.g. total supply
  balance: BigDecimal!
  supplyBalance: BigDecimal! # may be negative to represent the token being taken out of circulation
}

# Should be a single entry
# Used for tracking markets
# Olympus V1 bond auctions (Gnosis EasyAuction). Maintained from two events:
# `BondManager.GnosisAuctionLaunched` creates the GnosisAuction record;
# `GnosisEasyAuction.AuctionCleared` updates it with the cleared bid quantity
# and close timestamp. The snapshot path consumes these to emit
# TYPE_BONDS_PREMINTED / TYPE_BONDS_VESTING_* / TYPE_BONDS_DEPOSITS rows
# based on auction state (open / vesting / fully vested).
# Olympus V1 bonds are Ethereum-only, but we still scope by chainId for
# uniformity with other entities.
type GnosisAuctionRoot {
  id: ID! # "{chainId}" (dropped the redundant "GnosisAuction-" prefix per @0xJem PR #311 Step 4)
  chainId: Int! @index
  markets: [BigInt!]!
}

type GnosisAuction {
  id: ID! # "{chainId}-{marketId}"
  chainId: Int! @index
  marketId: BigInt! @index
  auctionOpenTimestamp: BigInt!
  payoutCapacity: BigDecimal!
  termSeconds: BigInt!
  bidQuantity: BigDecimal # Filled in by AuctionCleared
  auctionCloseTimestamp: BigInt
}

# Latest Bophades-Kernel module assignment per keycode. Maintained from
# Kernel `ActionExecuted` events (InstallModule / UpgradeModule). The snapshot
# path reads this to learn the currently-active TRSRY / CHREG / etc. modules
# without an RPC call. Per inventory-ethereum.md §8 "Bophades Treasury Module".
type BophadesModule {
  id: ID! # chainId-keycode
  chainId: Int! @index
  keycode: String! @index
  moduleAddress: String!
  installedAtBlock: BigInt!
  installedAtTimestamp: BigInt!
}

# Cooler clearinghouse registry membership. Maintained from
# ClearinghouseRegistry activation/deactivation events. `deregisteredAtBlock`
# is null while a clearinghouse is currently registered.
type ClearinghouseAddress {
  id: ID! # chainId-clearinghouseAddress
  chainId: Int! @index
  clearinghouseAddress: String! @index
  registeredAtBlock: BigInt!
  registeredAtTimestamp: BigInt!
  deregisteredAtBlock: BigInt
  deregisteredAtTimestamp: BigInt
}

# ---- Event-derived state used to build each snapshot without RPC ----

# Running ERC20 balance of a wallet for a token. Maintained from Transfer events.
# Used in place of balanceOf RPC reads at snapshot time. Per @0xJem on PR #315
# every event-driven state entity also has an immutable `XxxUpdate` companion
# (one row per event) for historical / time-travel queries.
# Native balances (e.g. BERA) are not represented here. TODO(native-balances).
type TokenBalance {
  id: ID! # chainId-tokenAddress-walletAddress (all lowercase)
  chainId: Int!
  tokenAddress: String!
  walletAddress: String!
  balance: BigInt! # raw token units; apply decimals when consumed
  updatedAtBlock: BigInt!
}

type TokenBalanceUpdate {
  id: ID! # chainId-tokenAddress-walletAddress-block-logIndex
  chainId: Int! @index
  tokenAddress: String! @index
  walletAddress: String! @index
  delta: BigInt! # signed change applied to the running balance for this event
  balance: BigInt! # running balance AFTER applying the delta
  block: BigInt! @index
  timestamp: BigInt!
}

# Per-chain sentinel for BackfillTokenBalances. Written once when the
# pre-window balance seed runs for a chain; the handler short-circuits
# on subsequent blocks once this exists. ID is the chainId as a string.
# Previous design used an exact-block `where: { _gte: X, _lte: X }`
# filter which only fired when HyperSync happened to deliver block X —
# i.e. only when block X contained a Transfer for one of our contracts.
# That coincided on Arbitrum (10,950,000) but not the other 5 chains,
# leaving pre-window balances unseeded everywhere else. Switching to a
# wide `_gte: startBlock` filter + this sentinel makes the seed run on
# the first delivered block at or after startBlock, regardless of how
# many "quiet" blocks separate startBlock from the first event.
type BackfillSentinel {
  id: ID! # chainId as string
  chainId: Int!
  seededAtBlock: BigInt! # the block we called `balanceOf` at (`startBlock - 1`)
  firedAtBlock: BigInt! # the block onBlock actually fired on (>= startBlock)
  seeded: Int! # number of (token, wallet) pairs with non-zero pre-window balance
  skipped: Int! # number skipped (zero balance, native, or token not yet deployed)
}

# Running ERC20 totalSupply. Maintained from Transfer-from-zero (mint) and Transfer-to-zero (burn).
type Erc20Supply {
  id: ID! # chainId-tokenAddress
  chainId: Int!
  tokenAddress: String!
  totalSupply: BigInt!
  updatedAtBlock: BigInt!
}

type Erc20SupplyUpdate {
  id: ID! # chainId-tokenAddress-block-logIndex
  chainId: Int! @index
  tokenAddress: String! @index
  delta: BigInt! # signed change applied to the running total supply
  totalSupply: BigInt! # running total supply AFTER applying the delta
  block: BigInt! @index
  timestamp: BigInt!
}

# Whether an Olympus Lender AMO is currently active and its running deployed-OHM
# balance. Maintained from AMOAdded / AMORemoved plus OHM Transfer events whose
# from/to is this AMO (replaces the per-snapshot getDeployedOhm RPC call).
type LenderAmo {
  id: ID! # chainId-amoAddress
  chainId: Int! @index
  amoAddress: String!
  active: Boolean! @index
  deployedOhm: BigInt!
  updatedAtBlock: BigInt!
}

# Running stake of a wallet in a Jones Staking pool. Maintained from Deposit / Withdraw /
# EmergencyWithdraw events.
type JonesStakingPosition {
  id: ID! # chainId-poolId-walletAddress
  chainId: Int!
  poolId: BigInt!
  walletAddress: String!
  amount: BigInt!
  updatedAtBlock: BigInt!
}

# Univ2 pool reserves. Maintained from Sync events.
type Univ2PoolState {
  id: ID! # chainId-poolAddress
  chainId: Int!
  poolAddress: String!
  reserve0: BigInt!
  reserve1: BigInt!
  updatedAtBlock: BigInt!
}

type Univ2PoolUpdate {
  id: ID! # chainId-poolAddress-block-logIndex
  chainId: Int! @index
  poolAddress: String! @index
  reserve0: BigInt!
  reserve1: BigInt!
  block: BigInt! @index
  timestamp: BigInt!
}

# Balancer V2 pool token balances. Tokens array is set on the first event seen
# (TokensRegistered, PoolBalanceChanged, or Swap) — for pools that were created
# before the chain's start_block, the balances are seeded via a one-shot cached
# effect (vault.getPoolTokens) so the running entity is correct from then on.
type BalancerPoolState {
  id: ID! # chainId-poolId
  chainId: Int!
  poolId: String!
  tokens: [String!]!
  balances: [BigInt!]!
  updatedAtBlock: BigInt!
}

type BalancerPoolUpdate {
  id: ID! # chainId-poolId-block-logIndex
  chainId: Int! @index
  poolId: String! @index
  tokens: [String!]!
  balances: [BigInt!]!
  block: BigInt! @index
  timestamp: BigInt!
}

# Maps a Kodiak LP wrapper to its underlying UniswapV3 pool. Populated once per
# Kodiak LP from the first Transfer event we observe (paired with a
# contractRegister handler that dynamically subscribes the underlying pool's
# Swap/Initialize events so it flows through Univ3PoolState).
type KodiakPool {
  id: ID! # chainId-kodiakLpAddress
  chainId: Int!
  kodiakLpAddress: String!
  underlyingPoolAddress: String!
  updatedAtBlock: BigInt!
}

# Univ3 pool spot state. Maintained from Initialize and Swap events.
type Univ3PoolState {
  id: ID! # chainId-poolAddress
  chainId: Int!
  poolAddress: String!
  sqrtPriceX96: BigInt!
  tick: BigInt!
  liquidity: BigInt!
  updatedAtBlock: BigInt!
}

type Univ3PoolUpdate {
  id: ID! # chainId-poolAddress-block-logIndex
  chainId: Int! @index
  poolAddress: String! @index
  sqrtPriceX96: BigInt!
  tick: BigInt!
  liquidity: BigInt!
  block: BigInt! @index
  timestamp: BigInt!
}

# Running deposit on the Treasure Atlas Mine, keyed by user and deposit index.
# Maintained from Deposit / Withdraw events.
type TreasureDeposit {
  id: ID! # chainId-walletAddress-depositId
  chainId: Int! @index
  walletAddress: String! @index
  depositId: BigInt!
  amount: BigInt!
  updatedAtBlock: BigInt!
}

# Native asset balance per protocol wallet. Maintained via bounded `getBalance`
# RPC at snapshot time — native assets emit no Transfer event so cannot be
# event-driven. Closes inherited TODO(native-balances) so chains that hold
# material native asset balances (e.g. Berachain BERA, Ethereum ETH) are
# represented in TokenRecord. Phase 4 wires up the snapshot-time read.
type NativeBalanceState {
  id: ID! # chainId-walletAddress
  chainId: Int! @index
  walletAddress: String! @index
  balance: BigInt! # raw wei (18 decimals on every supported chain)
  updatedAtBlock: BigInt!
}

# (ChainlinkPriceState / ChainlinkPriceUpdate removed: AnswerUpdated never
# fires from the EACAggregatorProxy addresses we register — the underlying
# aggregator emits them and its address rotates via Chainlink phase
# transitions. ChainlinkPriceHandler now reads `latestAnswer()` via the
# `readChainlinkLatestAnswer` cached effect; legacy parity preserved at the
# cost of ~90 RPCs/day at our 8h snapshot cadence. See commit 6bf06fa.)

# Latest sOHM (rebasing) index per chain. The sOHM V3 contract emits
# LogRebase(epoch, rebase, index) on every staking-epoch rebase; we persist
# the latest `index` so the gOHM pricing handler can compute
# gOHM_price = OHM_price × (index / 10^9) without a snapshot-time RPC.
# Legacy reads this via sOHMv3.index() in `getCurrentIndex` — see
# inventory-ethereum.md §4 "gOHM Price Routing".
#
# `sOhmAddress` is the contract that emits LogRebase. Currently Ethereum-only
# (sOHM V3 = 0x04906695D6D12CF5459975d7C3C03356E4Ccd460); other chains will
# share Ethereum's index value when GlobalMetricSnapshot ports the canonical
# `ohmIndex` field per Phase 1 decision #9.
type OhmIndexState {
  id: ID! # chainId-sOhmAddress
  chainId: Int! @index
  sOhmAddress: String! @index
  index: BigInt! # raw index at 9 decimals (e.g. 131283291432 = 131.28...)
  epoch: BigInt!
  updatedAtBlock: BigInt!
  updatedAtTimestamp: BigInt!
}

type OhmIndexUpdate {
  id: ID! # chainId-sOhmAddress-block-logIndex
  chainId: Int! @index
  sOhmAddress: String! @index
  index: BigInt!
  epoch: BigInt!
  block: BigInt! @index
  timestamp: BigInt!
}
