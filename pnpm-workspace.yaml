minimumReleaseAge: 10080
# The 7-day maturity gate above is good supply-chain hygiene for transitive
# deps, but blocks us from picking up envio releases inside the first week.
# Envio is our indexer framework — we want fast access to new versions and
# trust the upstream release process. Allowlist the entire envio family
# (the meta package + per-platform native binaries that ship under
# `optionalDependencies` of envio) so the maturity gate applies only to
# the long tail of transitives we don't actively curate.
#
# Per-platform binaries must be listed explicitly because pnpm's
# minimumReleaseAgeExclude does not accept globs.
minimumReleaseAgeExclude:
  - envio
  - envio-linux-x64
  - envio-linux-x64-musl
  - envio-linux-arm64
  - envio-darwin-x64
  - envio-darwin-arm64
preferFrozenLockfile: true
engineStrict: true
strictDepBuilds: true
blockExoticSubdeps: true
onlyBuiltDependencies:
  - "es5-ext@0.10.64"
  # esbuild ships native binaries it builds on install; required because
  # vitest (our test runner) depends on it transitively. Without this entry,
  # `strictDepBuilds: true` rejects the install with ERR_PNPM_IGNORED_BUILDS.
  - "esbuild@0.27.7"
overrides:
  "@pnpm/npm-conf": "^3.0.2"
  "ajv": "6.14.0"
  "axios": "^1.15.1"
  "brace-expansion": "^2.0.3"
  "cross-spawn": "^7.0.5"
  "diff@>=4.0.0 <4.0.4": "^4.0.4"
  "ejs": "^3.1.10"
  "es5-ext@>=0.10.0 <0.10.63": "^0.10.63"
  "flatted": "^3.4.2"
  "follow-redirects": "^1.16.0"
  "glob": "^11.1.0"
  "immutable": "^5.1.5"
  "js-yaml": "^4.1.1"
  "lodash": "^4.18.0"
  "lodash.trim": "4.18.0"
  "lodash.trimend": "4.18.0"
  "minimatch": "^10.2.3"
  "node-fetch": "^2.6.7"
  "node-forge": "^1.3.0"
  "picomatch": "^2.3.2"
  "ramda": "^0.27.2"
  "semver": "^7.5.2"
  "tmp@<=0.2.3": "^0.2.4"
  "undici": "^7.24.0"
  "yaml": "^2.8.3"
  "yargs-parser": "^18.1.1"
  # Envio bundles express + ws; these overrides patch the transitive
  # advisories CI's audit gate flagged at moderate+. Pinned to ranges
  # known to address each CVE without churning unrelated majors.
  "body-parser": "^1.20.3"
  "path-to-regexp": "^0.1.12"
  "qs": "^6.14.1"
  "ws": "^8.20.1"
