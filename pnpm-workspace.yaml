minimumReleaseAge: 10080
# The 7-day maturity gate above is good supply-chain hygiene for transitive
# deps, but blocks us from picking up envio releases inside the first week.
# Envio is our indexer framework — we want fast access to new versions and
# trust the upstream release process. Allowlist the entire envio family
# (the meta package + per-platform native binaries that ship under
# `optionalDependencies` of envio) so the maturity gate applies only to
# the long tail of transitives we don't actively curate.
#
# Per-platform binaries must be listed explicitly because pnpm's
# minimumReleaseAgeExclude does not accept globs.
minimumReleaseAgeExclude:
  - envio
  - envio-linux-x64
  - envio-linux-x64-musl
  - envio-linux-arm64
  - envio-darwin-x64
  - envio-darwin-arm64
preferFrozenLockfile: true
engineStrict: true
strictDepBuilds: true
blockExoticSubdeps: true
onlyBuiltDependencies:
  - "es5-ext@0.10.64"
  # esbuild ships native binaries it builds on install; required because
  # vitest (our test runner) depends on it transitively. Without this entry,
  # `strictDepBuilds: true` rejects the install with ERR_PNPM_IGNORED_BUILDS.
  - "esbuild@0.27.7"
overrides:
  "@pnpm/npm-conf": "^3.0.2"
  "ajv": "6.14.0"
  "axios": "^1.15.1"
  "brace-expansion": "^2.0.3"
  "cross-spawn": "^7.0.5"
  "diff@>=4.0.0 <4.0.4": "^4.0.4"
  "ejs": "^3.1.10"
  "es5-ext@>=0.10.0 <0.10.63": "^0.10.63"
  "flatted": "^3.4.2"
  "follow-redirects": "^1.16.0"
  "glob": "^11.1.0"
  "immutable": "^5.1.5"
  "js-yaml": "^4.1.1"
  "lodash": "^4.18.0"
  "lodash.trim": "4.18.0"
  "lodash.trimend": "4.18.0"
  "minimatch": "^10.2.3"
  "node-fetch": "^2.6.7"
  "node-forge": "^1.3.0"
  "picomatch": "^2.3.2"
  "ramda": "^0.27.2"
  "semver": "^7.5.2"
  "tmp@<=0.2.3": "^0.2.4"
  "undici": "^7.24.0"
  "yaml": "^2.8.3"
  "yargs-parser": "^18.1.1"
  # Envio bundles express + ws; these overrides patch the transitive
  # advisories CI's audit gate flagged at moderate+. Pinned to ranges
  # known to address each CVE without churning unrelated majors.
  "body-parser": "^1.20.3"
  "path-to-regexp": "^0.1.12"
  "qs": "^6.14.1"
  "ws": "^8.20.1"
  # Envio pins @fuel-ts/* to 0.96.1, which declares engines.node:
  # ^18.20.3 || ^20.0.0 || ^22.0.0 — explicitly rejects Node 24. Envio's
  # hosted indexer container runs Node 24 and refuses to install when
  # engines.node is violated. Bumping to 0.101.3 (the first release that
  # adds Node 24 to the accept list) unblocks the install. We don't
  # index Fuel chains, so the only path through @fuel-ts is via
  # hyperfuel-client init for Fuel data sources — none configured.
  "@fuel-ts/crypto": "^0.101.3"
  "@fuel-ts/errors": "^0.101.3"
  "@fuel-ts/hasher": "^0.101.3"
  "@fuel-ts/math": "^0.101.3"
  "@fuel-ts/utils": "^0.101.3"
  # Pin vite to a release older than minimumReleaseAge. vitest@4 accepts
  # vite ^6/^7/^8 and pnpm's resolver picks the highest matching, which
  # ends up being a too-fresh vite@8.0.14 when the lockfile gets
  # re-resolved (e.g. after a fuel-ts override change). 8.0.13 is the
  # newest release past the 7-day cutoff at time of writing.
  "vite": "8.0.13"
