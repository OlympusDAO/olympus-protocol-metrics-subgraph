packages:
  - apps/*
  - packages/*

blockExoticSubdeps: true
engineStrict: true
minimumReleaseAge: 10080
allowBuilds:
  "es5-ext@0.10.63": true
  # esbuild ships native binaries it builds on install; required because
  # vitest (our test runner) depends on it transitively. Without this entry,
  # `strictDepBuilds: true` rejects the install with ERR_PNPM_IGNORED_BUILDS.
  # Pinned to the patched 0.28.1 (see esbuild override below + GHSA fixes).
  "esbuild@0.28.1": true
# All CVE overrides are range-scoped — `pkg@<fixed: fixed` only patches
# resolutions that fall in the vulnerable range, leaving newer versions
# alone. Unscoped overrides (e.g. `"pkg": "^X"`) are a footgun: they force
# every consumer to a single version regardless of API compatibility, which
# is how `"yargs-parser": "^18.1.1"` clamped envio's yargs@17 down to a
# v18 parser that no longer exports `Parser.looksLikeNumber`. Mirrors the
# pattern used in OlympusDAO/protocol-visualizer#35.
overrides:
  # Scope @fuel-ts overrides to the envio subtree only. Envio pins
  # @fuel-ts/* to 0.96.1, which declares engines.node:
  # ^18.20.3 || ^20.0.0 || ^22.0.0 — explicitly rejects Node 24. Envio's
  # hosted indexer container runs Node 24 and refuses to install when
  # engines.node is violated. 0.103.0 (the visualizer-aligned baseline)
  # accepts Node 24 and pulls bn.js@5.2.3+ (closes GHSA-378v-28hj-76wf).
  # We don't index Fuel chains, so the only path through @fuel-ts is via
  # hyperfuel-client init for Fuel data sources — none configured.
  "envio>@fuel-ts/crypto@<0.103.0": "0.103.0"
  "envio>@fuel-ts/errors@<0.103.0": "0.103.0"
  "envio>@fuel-ts/hasher@<0.103.0": "0.103.0"
  "envio>@fuel-ts/math@<0.103.0": "0.103.0"
  "envio>@fuel-ts/utils@<0.103.0": "0.103.0"
  # bn.js GHSA-378v-28hj-76wf (moderate, maskn(0) DoS) — fixed in 4.12.3
  # and 5.2.3. Pulled transitively via @fuel-ts/math; the fuel-ts bump
  # above brings it along, this is belt-and-suspenders if pnpm dedupes.
  "bn.js@<4.12.3": "4.12.3"
  "bn.js@>=5.0.0 <5.2.3": "5.2.3"
  # Master's pnpm hardening, converted from unscoped pins.
  "@pnpm/npm-conf@<3.0.2": "3.0.2"
  "ajv@>=6.0.0 <7.0.0": "6.14.0"
  "axios@<1.15.1": "1.15.1"
  "brace-expansion@<1.1.13": "1.1.13"
  "brace-expansion@>=2.0.0 <2.0.3": "2.0.3"
  "brace-expansion@>=5.0.0 <5.0.6": "5.0.6"
  "cross-spawn@<7.0.5": "7.0.5"
  "diff@>=4.0.0 <4.0.4": "4.0.4"
  "ejs@<3.1.10": "3.1.10"
  "es5-ext@>=0.10.0 <0.10.63": "0.10.63"
  "flatted@<3.4.2": "3.4.2"
  "follow-redirects@<1.16.0": "1.16.0"
  "glob@<11.1.0": "11.1.0"
  "immutable@<5.1.5": "5.1.5"
  "js-yaml@<4.1.1": "4.1.1"
  "lodash@<4.18.0": "4.18.0"
  "lodash.trim@<4.18.0": "4.18.0"
  "lodash.trimend@<4.18.0": "4.18.0"
  # Per-major minimatch CVE bounds (CVE-2022-3517 and CVE-2024-9116 ReDoS).
  # Per-major scoping leaves intermediate ranges (3.1.4–4.x, 6.x–8.x)
  # untouched, mirroring visualizer#35.
  "minimatch@<3.1.4": "3.1.5"
  "minimatch@>=5.0.0 <5.1.8": "5.1.8"
  "minimatch@>=9.0.0 <9.0.7": "9.0.7"
  "node-fetch@<2.6.7": "2.6.7"
  "node-forge@<1.3.0": "1.3.0"
  "ip-address@<10.1.1": "10.1.1"
  "picomatch@<2.3.2": "2.3.2"
  "picomatch@>=4.0.0 <4.0.4": "4.0.4"
  "ramda@<0.27.2": "0.27.2"
  "semver@>=7.0.0 <7.5.2": "7.5.2"
  "tmp@<=0.2.3": "0.2.4"
  "undici@>=7.0.0 <7.24.0": "7.24.0"
  "yaml@<2.8.3": "2.8.3"
  # Envio bundles express + ws; patches the transitive advisories CI's
  # audit gate flagged at moderate+. Pinned to ranges known to address
  # each CVE without churning unrelated majors.
  "body-parser@<1.20.3": "1.20.3"
  "cookie@<0.7.0": "0.7.0"
  "express@<4.20.0": "4.20.0"
  "path-to-regexp@<0.1.13": "0.1.13"
  "qs@<6.15.2": "6.15.2"
  "send@<0.19.0": "0.19.0"
  "serve-static@<1.16.0": "1.16.0"
  # ws GHSA-96hv-2xvq-fx4p (high, memory-exhaustion DoS from tiny fragments),
  # fixed in 8.21.0. Pulled transitively via envio>ink>ws. The prior cap of
  # 8.20.1 predates this advisory and is still vulnerable; bumped to 8.21.0
  # (released 2026-05-22, past the 7-day cutoff). Range-scoped per convention.
  "ws@>=8.0.0 <8.21.0": "8.21.0"
  # vite GHSA-fx2h-pf6j-xcff (server.fs.deny bypass) + GHSA-v6wh-96g9-6wx3
  # (NTLMv2 disclosure), both fixed in 8.0.16. Previously this override
  # pinned vite DOWN to 8.0.13 purely as a maturity-gate workaround (vitest@4
  # accepts vite ^6/^7/^8 and the resolver picked the too-fresh 8.0.14). The
  # patched 8.0.16 (released 2026-06-01) is now well past the 7-day cutoff,
  # so the override doubles as the CVE fix. Range-scoped per the convention
  # above: only the vulnerable 8.0.x line is forced to 8.0.16.
  "vite@>=8.0.0 <8.0.16": "8.0.16"
  # esbuild GHSA-gv7w-rqvm-qjhr (RCE via NPM_CONFIG_REGISTRY in the Deno
  # module) + GHSA-g7r4-m6w7-qqqr (dev-server arbitrary file read), both
  # fixed in 0.28.1. vite@8.0.16 accepts esbuild ^0.27.0 || ^0.28.0, so the
  # bump is peer-compatible.
  "esbuild@>=0.17.0 <0.28.1": "0.28.1"
preferFrozenLockfile: true
strictDepBuilds: true
