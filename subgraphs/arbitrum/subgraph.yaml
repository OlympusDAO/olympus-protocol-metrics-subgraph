specVersion: 0.0.8
description: Olympus Protocol Metrics Subgraph - Arbitrum
repository: https://github.com/OlympusDAO/olympus-protocol-metrics-subgraph
# Given the block speed of Arbitrum, it is abominably slow to index from scratch.
# Avoid changing the schema, as it will require indexing from scratch.
# features:
#   - grafting
# graft:
#   base: QmRf3fo7tVsXsj9cQZSgT3Y2R67Hv41T1Ph559oQAmTLe1 # 1.6.4
#   block: 190428287 # POL deployment
schema:
  file: ../../schema.graphql
dataSources:
  - kind: ethereum/contract
    name: TokenRecords-arbitrum
    network: arbitrum-one
    source:
      address: "0x5D041081725468Aa43e72ff0445Fde2Ad1aDE775" # FRAX-USD aggregator, stopped updating 2026-04-10
      abi: ChainlinkAggregator
      startBlock: 10950000 # 2022-05-01
      endBlock: 451191255 # 2026-04-11 00:00:00 UTC
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TokenRecord
        - TokenSupply
      abis:
        - name: ERC20
          file: ../shared/abis/ERC20.json
        - name: gOHM
          file: ../shared/abis/gOHM.json
        - name: OlympusLender
          file: abis/OlympusLender.json
        # Price Lookup
        - name: BalancerVault
          file: ../shared/abis/BalancerVault.json
        - name: BalancerPoolToken
          file: ../shared/abis/BalancerPoolToken.json
        - name: UniswapV2Pair
          file: ../shared/abis/UniswapV2Pair.json
        - name: UniswapV3Pair
          file: ../shared/abis/UniswapV3Pair.json
        - name: ChainlinkPriceFeed
          file: ../shared/abis/ChainlinkPriceFeed.json
        # Custom ABIs
        - name: JONESStaking
          file: abis/JONESStaking.json
        - name: TreasureMining
          file: abis/TreasureMining.json
        - name: ChainlinkAggregator
          file: abis/ChainlinkAggregator.json
      eventHandlers:
        - event: NewRound(indexed uint256,indexed address,uint256)
          handler: handleEvent
      file: ./src/treasury/Assets.ts
  - kind: ethereum/contract
    name: TokenRecords-arbitrum-frax-usd-2026-04
    network: arbitrum-one
    source:
      address: "0x767802a8610C3D34CbeC9d064028EacA976dAba0" # FRAX-USD aggregator for proxy 0x0809E3d38d1B4214958faf06D8b1B1a2b73f2ab8
      abi: ChainlinkAggregator
      startBlock: 451191255 # 2026-04-11 00:00:00 UTC
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      entities:
        - TokenRecord
        - TokenSupply
      abis:
        - name: ERC20
          file: ../shared/abis/ERC20.json
        - name: gOHM
          file: ../shared/abis/gOHM.json
        - name: OlympusLender
          file: abis/OlympusLender.json
        # Price Lookup
        - name: BalancerVault
          file: ../shared/abis/BalancerVault.json
        - name: BalancerPoolToken
          file: ../shared/abis/BalancerPoolToken.json
        - name: UniswapV2Pair
          file: ../shared/abis/UniswapV2Pair.json
        - name: UniswapV3Pair
          file: ../shared/abis/UniswapV3Pair.json
        - name: ChainlinkPriceFeed
          file: ../shared/abis/ChainlinkPriceFeed.json
        # Custom ABIs
        - name: JONESStaking
          file: abis/JONESStaking.json
        - name: TreasureMining
          file: abis/TreasureMining.json
        - name: ChainlinkAggregator
          file: abis/ChainlinkAggregator.json
      eventHandlers:
        - event: NewRound(indexed uint256,indexed address,uint256)
          handler: handleEvent
      file: ./src/treasury/Assets.ts
