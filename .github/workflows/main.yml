# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  pull_request:
    types: [opened, synchronize, reopened]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Minimum permissions for GITHUB_TOKEN — this workflow only reads the
# repo contents (lint, tests, type-check). Matches audit.yml's policy
# and satisfies CodeQL alerts #15 / #16 for the missing permissions
# block on the workflow level.
permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap
        uses: ./.github/actions/bootstrap
      - name: Check
        run: pnpm run check

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap
        uses: ./.github/actions/bootstrap

      - name: Unit Tests
        run: pnpm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Bootstrap
        uses: ./.github/actions/bootstrap

      - name: Codegen
        run: pnpm codegen

      - name: Type check
        run: pnpm build
