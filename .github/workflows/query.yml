name: Query Test
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test-branch:
    strategy:
      matrix:
        subgraph: [ethereum, arbitrum, base, berachain]
    # Pin the runner to ubuntu-22.04 to avoid an incompatibility with ubuntu 24 and graph test
    # https://github.com/graphprotocol/graph-tooling/issues/1546
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - name: Install
        run: |
          pnpm install --no-frozen-lockfile
      - name: Check Variables
        run: |
          DEPLOYMENT_ID=$(jq -r .id subgraphs/${{ matrix.subgraph }}/config.json)
          [[ ! -z "$DEPLOYMENT_ID" ]] && echo "deployment id is set" || (echo "::error::deployment id is not set in config.json" && exit 1)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
      - name: Get Latest Date
        env:
          GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY }}
        run: |
          pnpm subgraph latest-date ${{ matrix.subgraph }} --deployment ${{ env.DEPLOYMENT_ID }}
      - name: Get Token Records
        env:
          GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY }}
        run: |
          pnpm subgraph query ${{ matrix.subgraph }} --branch branch --deployment ${{ env.DEPLOYMENT_ID }}
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.subgraph }}
          path: build/results-${{ matrix.subgraph }}.json
  test-base:
    strategy:
      matrix:
        subgraph: [ethereum, arbitrum, base, berachain]
    runs-on: ubuntu-latest
    needs: [test-branch]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.base_ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      - name: Install
        run: |
          pnpm install --frozen-lockfile
      - name: Check Variables
        run: |
          DEPLOYMENT_ID=$(jq -r .id subgraphs/${{ matrix.subgraph }}/config.json)
          [[ ! -z "$DEPLOYMENT_ID" ]] && echo "deployment id is set" || (echo "::error::deployment id is not set in config.json" && exit 1)
          echo "DEPLOYMENT_ID=$DEPLOYMENT_ID" >> $GITHUB_ENV
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: results-${{ matrix.subgraph }}
          path: build/
      - name: Get Token Records
        env:
          GRAPH_API_KEY: ${{ secrets.GRAPH_API_KEY }}
        run: |
          pnpm subgraph query ${{ matrix.subgraph }} --branch base --deployment ${{ env.DEPLOYMENT_ID }}
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.subgraph }}
          path: build/results-${{ matrix.subgraph }}.json
  compare:
    strategy:
      matrix:
        subgraph: [ethereum, arbitrum, base, berachain]
    runs-on: ubuntu-latest
    needs: [test-branch, test-base]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
      # Looks for an existing comment, so it can be updated
      - name: Find Existing Comment
        uses: peter-evans/find-comment@v2
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: ${{ matrix.subgraph }}
      - name: Install
        run: |
          pnpm install --frozen-lockfile
      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: results-${{ matrix.subgraph }}
          path: build/
      - name: Compare Token Records
        run: |
          pnpm subgraph compare ${{ matrix.subgraph }}
      - name: Upload Results
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.subgraph }}
          path: build/results-${{ matrix.subgraph }}.json
      - name: Prepare Results Output
        id: output
        # We store the output in the github environment as it's a multiline string: https://docs.github.com/en/actions/using-workflows/workflow-commands-for-github-actions#multiline-strings
        run: |
          echo "OUTPUT<<EOF" >> $GITHUB_ENV
          echo "$(jq -r .results.output build/results-${{ matrix.subgraph }}.json)" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
      - name: Post Comment
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }} # If no comment exists, a new comment will be created
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ${{ env.OUTPUT }}

  skipped-networks-note:
    runs-on: ubuntu-latest
    needs: [compare]
    steps:
      - name: Find Existing Skip Note
        uses: peter-evans/find-comment@v2
        id: fc
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: Query checks skipped networks
      - name: Post Skip Note
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            ### Query checks skipped networks

            - `fantom` skipped due to deployment non-availability.
            - `polygon` skipped due to deployment non-availability.
