name: olympus-protocol-metrics

services:
  postgres:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: testing
      POSTGRES_DB: envio-dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d envio-dev"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - metrics-private

  hasura:
    build:
      context: .
      dockerfile: Dockerfile-hasura
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://postgres:testing@postgres:5432/envio-dev
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-local-dev-secret}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "false"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,query-log
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - metrics-private

  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-22T22-12-26Z@sha256:a1ea29fa28355559ef137d71fc570e508a214ec84ff8083e39bc5428980b015e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    networks:
      - metrics-private

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-04-16T18-13-26Z@sha256:aead63c77f9db9107f1696fb08ecb0faeda23729cde94b0f663edf4fe09728e3
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}"; do
          sleep 1
        done
        mc mb -p "local/${ARTIFACT_BUCKET:-metrics}" || true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-metrics}
    networks:
      - metrics-private

  indexer:
    build:
      context: .
      dockerfile: Dockerfile-indexer
    environment:
      ENVIO_PG_HOST: postgres
      ENVIO_PG_PORT: 5432
      ENVIO_PG_USER: postgres
      ENVIO_PG_PASSWORD: testing
      ENVIO_PG_DATABASE: envio-dev
      ENVIO_PG_SCHEMA: public
      ENVIO_TUI: "false"
      ENVIO_API_TOKEN: ${ENVIO_API_TOKEN:-local-dev}
      ENVIO_ARBITRUM_RPC_URL: ${ENVIO_ARBITRUM_RPC_URL:-https://arbitrum.rpc.subquery.network/public}
      ENVIO_BERACHAIN_RPC_URL: ${ENVIO_BERACHAIN_RPC_URL:-https://rpc.berachain.com}
      ENVIO_BASE_RPC_URL: ${ENVIO_BASE_RPC_URL:-https://base.llamarpc.com}
      ENVIO_POLYGON_RPC_URL: ${ENVIO_POLYGON_RPC_URL:-https://polygon-rpc.com}
      ENVIO_FANTOM_RPC_URL: ${ENVIO_FANTOM_RPC_URL:-https://rpcapi.fantom.network}
      ENVIO_ETHEREUM_RPC_URL: ${ENVIO_ETHEREUM_RPC_URL:-https://eth.llamarpc.com}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metrics-private

  metrics-api:
    build:
      context: .
      dockerfile: Dockerfile-metrics-api
    environment:
      PORT: 3000
      METRICS_API_MAX_RANGE_DAYS: ${METRICS_API_MAX_RANGE_DAYS:-366}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-metrics}
      ARTIFACT_ENDPOINT: http://minio:9000
      ARTIFACT_REGION: us-east-1
      ARTIFACT_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      ARTIFACT_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${METRICS_API_PORT:-3000}:3000"
    networks:
      - metrics-private

  metrics-publisher:
    profiles:
      - publish
    build:
      context: .
      dockerfile: Dockerfile-metrics-publisher
    environment:
      HASURA_GRAPHQL_ENDPOINT: http://hasura:8080/v1/graphql
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-local-dev-secret}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-metrics}
      ARTIFACT_ENDPOINT: http://minio:9000
      ARTIFACT_REGION: us-east-1
      ARTIFACT_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      ARTIFACT_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      PUBLISHER_MODE: ${PUBLISHER_MODE:-incremental}
      PUBLISHER_LOOKBACK_DAYS: ${PUBLISHER_LOOKBACK_DAYS:-3}
      PUBLISHER_START_DATE: ${PUBLISHER_START_DATE:-}
      PUBLISHER_END_DATE: ${PUBLISHER_END_DATE:-}
    depends_on:
      hasura:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - metrics-private

volumes:
  postgres-data:
  minio-data:

networks:
  metrics-private:
