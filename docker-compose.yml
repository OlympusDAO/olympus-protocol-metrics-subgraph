name: olympus-protocol-metrics

services:
  postgres:
    image: postgres:17-alpine@sha256:979c4379dd698aba0b890599a6104e082035f98ef31d9b9291ec22f2b13059ca
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-testing}
      POSTGRES_DB: ${POSTGRES_DB:-envio-dev}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - metrics-private

  hasura:
    build:
      context: .
      dockerfile: Dockerfile-hasura
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-testing}@postgres:5432/${POSTGRES_DB:-envio-dev}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-local-dev-secret}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "false"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup,http-log,query-log
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - metrics-private

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-metricsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-metrics-local-password}
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - metrics-private

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${MINIO_ROOT_USER:-metricsadmin}" "${MINIO_ROOT_PASSWORD:-metrics-local-password}"; do
          sleep 1
        done
        mc mb -p "local/${ARTIFACT_BUCKET:-metrics}" || true
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-metricsadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-metrics-local-password}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-metrics}
    networks:
      - metrics-private

  indexer:
    build:
      context: .
      dockerfile: Dockerfile-indexer
    environment:
      ENVIO_PG_HOST: ${ENVIO_PG_HOST:-postgres}
      ENVIO_PG_PORT: ${ENVIO_PG_PORT:-5432}
      ENVIO_PG_USER: ${ENVIO_PG_USER:-${POSTGRES_USER:-postgres}}
      ENVIO_PG_PASSWORD: ${ENVIO_PG_PASSWORD:-${POSTGRES_PASSWORD:-testing}}
      ENVIO_PG_DATABASE: ${ENVIO_PG_DATABASE:-${POSTGRES_DB:-envio-dev}}
      ENVIO_PG_SCHEMA: ${ENVIO_PG_SCHEMA:-public}
      ENVIO_PG_SSL_MODE: ${ENVIO_PG_SSL_MODE:-false}
      ENVIO_PG_MAX_CONNECTIONS: ${ENVIO_PG_MAX_CONNECTIONS:-2}
      HASURA_GRAPHQL_ENDPOINT: ${INDEXER_HASURA_GRAPHQL_ENDPOINT:-http://hasura:8080/v1/metadata}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-local-dev-secret}
      ENVIO_TUI: "false"
      ENVIO_INDEXER_PORT: ${ENVIO_INDEXER_PORT:-9898}
      ENVIO_MAX_PARTITION_CONCURRENCY: ${ENVIO_MAX_PARTITION_CONCURRENCY:-10}
      ENVIO_API_TOKEN: ${ENVIO_API_TOKEN:?Set ENVIO_API_TOKEN in .env to run the compose stack}
      ENVIO_ARBITRUM_RPC_URL: ${ENVIO_ARBITRUM_RPC_URL:-https://arbitrum.rpc.subquery.network/public}
      ENVIO_BERACHAIN_RPC_URL: ${ENVIO_BERACHAIN_RPC_URL:-https://rpc.berachain.com}
      ENVIO_BASE_RPC_URL: ${ENVIO_BASE_RPC_URL:-https://base.llamarpc.com}
      ENVIO_POLYGON_RPC_URL: ${ENVIO_POLYGON_RPC_URL:-https://polygon-bor-rpc.publicnode.com}
      ENVIO_FANTOM_RPC_URL: ${ENVIO_FANTOM_RPC_URL:-https://rpcapi.fantom.network}
      ENVIO_ETHEREUM_RPC_URL: ${ENVIO_ETHEREUM_RPC_URL:-https://eth.llamarpc.com}
      ENVIO_RPC_HTTP_BATCH_SIZE: ${ENVIO_RPC_HTTP_BATCH_SIZE:-10}
      ENVIO_RPC_MULTICALL_BATCH_SIZE: ${ENVIO_RPC_MULTICALL_BATCH_SIZE:-128}
      ENVIO_RPC_TIMEOUT_MS: ${ENVIO_RPC_TIMEOUT_MS:-30000}
    depends_on:
      postgres:
        condition: service_healthy
      hasura:
        condition: service_healthy
    networks:
      - metrics-private

  metrics-api:
    build:
      context: .
      dockerfile: Dockerfile-metrics-api
    environment:
      PORT: 3000
      METRICS_API_MAX_RANGE_DAYS: ${METRICS_API_MAX_RANGE_DAYS:-366}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-metrics}
      ARTIFACT_ENDPOINT: ${ARTIFACT_ENDPOINT:-http://minio:9000}
      ARTIFACT_REGION: ${ARTIFACT_REGION:-us-east-1}
      ARTIFACT_ACCESS_KEY_ID: ${ARTIFACT_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-metricsadmin}}
      ARTIFACT_SECRET_ACCESS_KEY: ${ARTIFACT_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-metrics-local-password}}
    depends_on:
      minio-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:${METRICS_API_PORT:-3000}:3000"
    networks:
      - metrics-private

  metrics-publisher:
    profiles:
      - publish
    build:
      context: .
      dockerfile: Dockerfile-metrics-publisher
    environment:
      HASURA_GRAPHQL_ENDPOINT: ${HASURA_GRAPHQL_ENDPOINT:-http://hasura:8080/v1/graphql}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_GRAPHQL_ADMIN_SECRET:-local-dev-secret}
      ARTIFACT_BUCKET: ${ARTIFACT_BUCKET:-metrics}
      ARTIFACT_ENDPOINT: ${ARTIFACT_ENDPOINT:-http://minio:9000}
      ARTIFACT_REGION: ${ARTIFACT_REGION:-us-east-1}
      ARTIFACT_ACCESS_KEY_ID: ${ARTIFACT_ACCESS_KEY_ID:-${MINIO_ROOT_USER:-metricsadmin}}
      ARTIFACT_SECRET_ACCESS_KEY: ${ARTIFACT_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-metrics-local-password}}
      PUBLISHER_MODE: ${PUBLISHER_MODE:-incremental}
      PUBLISHER_PUBLIC_START_DATE: ${PUBLISHER_PUBLIC_START_DATE:-2022-05-01}
      PUBLISHER_LOOKBACK_DAYS: ${PUBLISHER_LOOKBACK_DAYS:-3}
      PUBLISHER_LOCK_TTL_MS: ${PUBLISHER_LOCK_TTL_MS:-43200000}
      PUBLISHER_START_DATE: ${PUBLISHER_START_DATE:-}
      PUBLISHER_END_DATE: ${PUBLISHER_END_DATE:-}
    depends_on:
      hasura:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    networks:
      - metrics-private

volumes:
  postgres-data:
  minio-data:

networks:
  metrics-private:
